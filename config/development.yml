LOG_LEVEL: INFO
HOST: 127.0.0.1
PORT: 8000

# CORS settings - modify according to your frontend URLs
ORIGINS: ['http://localhost:8080', 'http://127.0.0.1:8080']

# Database configuration - modify with your database credentials
DATABASE:
  DRIVER: mysql
  NAME: your_database_name
  HOST: 127.0.0.1
  PORT: 3306
  USERNAME: your_username
  PASSWORD: your_password
  QUERY:
    charset: utf8mb4

# JWT settings - generate your own secret key using: python -c "import secrets; print(secrets.token_urlsafe(32))"
JWT_SECRET_KEY: your_jwt_secret_key_here
ALGORITHM: HS256
ACCESS_TOKEN_EXPIRE_MINUTES: 30

# API whitelist - endpoints that don't require authentication
WHITE_LIST: ['/api/login', '/api/register', '/static', '/docs', '/swagger', '/openapi', '/api/auth']

# Default password for new users - change this in production
DEFAULT_PASSWORD: change_this_default_password